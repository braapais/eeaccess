name: EEAccess
options:
  bundleIdPrefix: com.brunopais
  deploymentTarget:
    iOS: "26.0"
    watchOS: "26.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "2.4"
    CURRENT_PROJECT_VERSION: "4"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "325KTS65QS"
    GENERATE_INFOPLIST_FILE: NO
    ENABLE_PREVIEWS: YES
    SWIFT_EMIT_LOC_STRINGS: YES
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

packages:
  TeslaBLE:
    path: TeslaKeyKit

targets:
  EEAccess:
    type: application
    platform: iOS
    sources:
      - path: Shared
      - path: iOS
        excludes:
          - "Info.plist"
      - path: iOS/Info.plist
        buildPhase: none
      - path: iOS/Assets.xcassets
    dependencies:
      - target: EEAccessWatchApp
        embed: true
        codeSign: true
      - target: EEAccessShareExtension
        embed: true
        codeSign: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.elbaeverywhere.eeaccess
        PRODUCT_NAME: EEAccess
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: iOS/Info.plist
        CODE_SIGN_ENTITLEMENTS: iOS/EEAccess.entitlements
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO

  EEAccessShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShareExtension
        excludes:
          - "Info.plist"
          - "EEAccessShareExtension.entitlements"
      - path: ShareExtension/Info.plist
        buildPhase: none
      - path: ShareExtension/EEAccessShareExtension.entitlements
        buildPhase: none
      - path: Shared/AppGroup.swift
      - path: Shared/PendingShare.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.elbaeverywhere.eeaccess.share
        PRODUCT_NAME: EEAccessShareExtension
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: ShareExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: ShareExtension/EEAccessShareExtension.entitlements
        SKIP_INSTALL: YES

  EEAccessWatchApp:
    type: application
    platform: watchOS
    productName: "EEAccess Watch App"
    dependencies:
      - package: TeslaBLE
        product: TeslaBLE
      - target: EEAccessComplication
        embed: true
        codeSign: true
    sources:
      - path: Shared
      - path: Watch
        excludes:
          - "Info.plist"
      - path: Watch/Info.plist
        buildPhase: none
      - path: Watch/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.elbaeverywhere.eeaccess.watchkitapp
        PRODUCT_NAME: "EEAccess Watch App"
        TARGETED_DEVICE_FAMILY: "4"
        INFOPLIST_FILE: Watch/Info.plist

  EEAccessComplication:
    type: app-extension
    platform: watchOS
    sources:
      - path: WatchComplication
        excludes:
          - "Info.plist"
      - path: WatchComplication/Info.plist
        buildPhase: none
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.elbaeverywhere.eeaccess.watchkitapp.carkey
        PRODUCT_NAME: EEAccessComplication
        TARGETED_DEVICE_FAMILY: "4"
        INFOPLIST_FILE: WatchComplication/Info.plist
        SKIP_INSTALL: YES

schemes:
  EEAccess:
    build:
      targets:
        EEAccess: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  EEAccessWatchApp:
    build:
      targets:
        EEAccessWatchApp: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
