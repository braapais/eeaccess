# Temporary port-80-only site used ONLY to obtain the first Let's Encrypt cert
# (HTTP-01 webroot). Install this first, reload nginx, run certbot, then swap in
# eeaccess.conf. Avoids nginx failing `-t` on a cert that doesn't exist yet.
server {
	listen 80;
	listen [::]:80;
	server_name eeaccess.elbaeverywhere.com;

	location /.well-known/acme-challenge/ {
		root /var/www/certbot;
		allow all;
	}
	location / {
		add_header Content-Type text/plain;
		return 200 "eeaccess: awaiting TLS\n";
	}
}
