# nginx site for eeaccess.elbaeverywhere.com — reverse-proxies to the EEAccess
# Tesla relay (Node) on 127.0.0.1:8737. Same pattern as the other ee* sites.
# Install: sudo cp into /etc/nginx/sites-enabled/eeaccess.elbaeverywhere.com,
# then `sudo nginx -t && sudo systemctl reload nginx`. Needs the cert first
# (see eeaccess-step1.conf + certbot).
server {
	listen 80;
	listen [::]:80;
	server_name eeaccess.elbaeverywhere.com;

	location /.well-known/acme-challenge/ {
		root /var/www/certbot;
		allow all;
	}
	location / {
		return 301 https://$host$request_uri;
	}
}

server {
	listen 443 ssl http2;
	listen [::]:443 ssl http2;
	server_name eeaccess.elbaeverywhere.com;

	add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
	add_header X-Content-Type-Options "nosniff" always;
	add_header Referrer-Policy "no-referrer" always;

	ssl_protocols TLSv1.2 TLSv1.3;
	ssl_ciphers HIGH:!aNULL:!MD5;

	access_log /var/log/nginx/eeaccess_access.log;
	error_log  /var/log/nginx/eeaccess_error.log;

	client_max_body_size 4m;

	proxy_set_header Host              $host;
	proxy_set_header X-Real-IP         $remote_addr;
	proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
	proxy_set_header X-Forwarded-Host  $host;
	proxy_set_header X-Forwarded-Proto $scheme;

	location / {
		proxy_pass http://127.0.0.1:8737;
	}

	ssl_certificate     /etc/letsencrypt/live/eeaccess.elbaeverywhere.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/eeaccess.elbaeverywhere.com/privkey.pem;
}
